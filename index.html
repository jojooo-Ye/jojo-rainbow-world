<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jojo's rainbow world</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Geist+Pixel&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0; width: 100%; height: 100%;
            background-color: #000000; color: #ffffff;
            font-family: 'Geist Pixel', monospace, sans-serif;
            overflow: hidden; user-select: none;
        }

        /* 背景画布 */
        #dotFieldCanvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        /* 页面容器 */
        .page-content {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; width: 100vw; height: 100vh;
            opacity: 0; pointer-events: none;
            transition: opacity 0.6s ease;
            z-index: 15; box-sizing: border-box;
        }
        .page-content.active { opacity: 1;
            pointer-events: auto; }

        /* P1 居中精美布局 */
        #p1-content {
            flex-direction: column;
            justify-content: center; align-items: center; padding: 0;
        }
        .p1-center-panel {
            display: flex;
            flex-direction: column; justify-content: center; align-items: center; 
            width: 90vw; max-width: 600px; z-index: 20; text-align: center;
        }

        /* P2 留言板居中 */
        #p2-content { flex-direction: column;
            justify-content: center; align-items: center; }

        /* 共有无缝自适应彩虹 */
        #shared-rainbow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at 50% 100%, 
                rgba(255, 0, 0, 0.45) 0%, rgba(255, 127, 0, 0.45) 15%, 
                rgba(255, 255, 0, 0.45) 30%, rgba(0, 255, 0, 0.45) 45%, 
                rgba(0, 0, 255, 0.45) 60%, rgba(75, 0, 130, 0.45) 75%, 
                rgba(148, 0, 211, 0) 90%);
            z-index: 5;
            transition: all 1.4s cubic-bezier(0.19, 1, 0.22, 1), filter 1.2s ease;
        }
        
        #shared-rainbow.state-p1 {
            width: 700px;
            height: 350px; border-radius: 350px 350px 0 0; filter: blur(25px);
        }

        #shared-rainbow.state-p2 {
            width: 1800px;
            height: 900px; border-radius: 900px 900px 0 0; filter: blur(12px);
            background: radial-gradient(circle at 50% 100%, 
                rgba(255, 0, 0, 0.25) 0%, rgba(255, 127, 0, 0.25) 15%, 
                rgba(255, 255, 0, 0.25) 30%, rgba(0, 255, 0, 0.25) 45%, 
                rgba(0, 0, 255, 0.25) 60%, rgba(75, 0, 130, 0.25) 75%, 
                rgba(148, 0, 211, 0) 90%);
        }

        /* --- 阶梯式流式加载效果 --- */
        .split-word { display: inline-block;
            white-space: nowrap; }
        .split-char, .cascade-item {
            display: inline-block;
            opacity: 0; transform: translateY(40px);
            transition: opacity 1.25s cubic-bezier(0.215, 0.610, 0.355, 1), 
                        transform 1.25s cubic-bezier(0.215, 0.610, 0.355, 1);
        }
        .split-char.animate-in, .cascade-item.animate-in { opacity: 1; transform: translateY(0);
        }

        /* 状态锁：二次加载直接呈现 */
        .no-anim .split-char, .no-anim .cascade-item {
            opacity: 1 !important;
            transform: translateY(0) !important; transition: none !important;
        }

        textarea.cascade-item, div.cascade-item { display: block;
        }
        button.cascade-item { display: inline-block;
        }

        /* --- 炫彩按钮 --- */
        .rainbow-btn {
            font-family: 'Geist Pixel', monospace, sans-serif;
            padding: 14px 42px; font-size: 1.4rem; font-weight: bold; color: white;
            background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            background-size: 400% 400%; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 15px rgba(255,255,255,0.3);
            animation: rainbowShift 5s ease infinite;
            transition: transform 0.2s ease, filter 0.3s ease, box-shadow 0.2s ease;
            z-index: 100; position: relative;
        }
        .rainbow-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(255,255,255,0.6);
        }
        .rainbow-btn:active { filter: grayscale(100%) brightness(0.4) saturate(0); transform: scale(0.96);
        }

        /* 强制画布高度和宽度，高度从 120px 调升至 150px 以适应更大的字体并防止截断 —— 已调高 z-index 增强独立层级防止遮挡 */
        .canvas-container { position: relative;
            width: 100%; height: 150px; display: flex; justify-content: center; align-items: center; z-index: 20;
        }
        .p1-subtitle { font-size: 1.3rem; margin-top: 15px; color: #cccccc; text-align: center;
        }
        .start-btn { margin-top: 30px;
        }

        /* P2 留言板 */
        #p2-star-layer { position: absolute;
            width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 55;
        }
        .board-container { width: 90%; max-width: 580px; text-align: center; z-index: 60;
        }
        .board-container h2 { font-size: 2.2rem; margin-top: 0; margin-bottom: 25px;
        }
        .board-container textarea {
            font-family: 'Geist Pixel', monospace, sans-serif;
            width: 100%; height: 120px; background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 12px;
            color: white; padding: 14px;
            font-size: 1.2rem; resize: none; margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }
        .board-container textarea:focus { outline: none;
            border-color: #ffffff; }
        .board-actions { display: flex; gap: 20px; justify-content: center; align-items: stretch;
        }
        .action-button-block { flex: 1; display: flex; flex-direction: column; align-items: center;
        }
        
        .board-submit-btn {
            font-family: 'Geist Pixel', monospace, sans-serif;
            width: 100%; padding: 12px 10px; border: none; border-radius: 20px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            position: relative; overflow: hidden;
            z-index: 1;
            backdrop-filter: blur(5px);
            transition: transform 0.2s, color 0.4s;
        }
        
        .btn-private {
            background: rgba(163, 230, 53, 0.15);
            color: rgba(163, 230, 53, 0.7);
            border: 1px solid rgba(163, 230, 53, 0.3);
        }
        .btn-public {
            background: rgba(6, 182, 212, 0.15);
            color: rgba(6, 182, 212, 0.7);
            border: 1px solid rgba(6, 182, 212, 0.3);
        }

        .board-submit-btn::after {
            content: '';
            position: absolute;
            left: var(--ripple-x, 50%);
            top: var(--ripple-y, 50%);
            width: 20px;
            height: 20px;
            margin-left: -10px;
            margin-top: -10px;
            border-radius: 50%;
            transform: scale(0);
            pointer-events: none;
            z-index: -1;
        }

        .board-submit-btn.btn-active-ink::after {
            animation: inkSpread 0.45s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        .btn-private::after {
            background: #84cc16;
        }
        .btn-public::after {
            background: #0891b2;
        }

        .board-submit-btn.btn-active-ink {
            color: #000000;
            border-color: transparent;
        }

        .board-submit-btn:active {
            transform: scale(0.97);
        }

        @keyframes inkSpread {
            0% {
                transform: scale(0);
                opacity: 0.3;
            }
            50% {
                opacity: 0.9;
            }
            100% {
                transform: scale(35);
                opacity: 1;
            }
        }
        
        .button-subheading { font-size: 0.85rem;
            color: #eeeeee; margin-top: 10px; line-height: 1.3; }

        .nav-bottom-left { position: absolute; bottom: 30px;
            left: 30px; z-index: 100; }
        .nav-bottom-right { position: absolute; bottom: 30px; right: 30px;
            z-index: 100; }

        /* 弹幕星星 */
        .flying-star {
            font-family: 'Geist Pixel', monospace, sans-serif;
            position: absolute; white-space: nowrap; padding: 10px 22px;
            font-size: 1.1rem; cursor: pointer; z-index: 60; color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(5px);
        }
        .private-star { border-color: rgba(163, 230, 53, 0.5);
            text-shadow: 0 0 8px rgba(163, 230, 53, 0.8); }
        
        /* 刷屏特效 */
        #rainbow-transition {
            position: fixed;
            top: 0; width: 150%; height: 100%;
            background: linear-gradient(90deg, rgba(255,0,0,1) 0%, rgba(255,127,0,1) 16%, rgba(255,255,0,1) 33%, rgba(0,255,0,1) 50%, rgba(0,0,255,1) 66%, rgba(75,0,130,1) 83%, rgba(148,0,211,1) 100%);
            z-index: 9999; pointer-events: none; display: none;
        }
        .swipe-forward { display: block !important;
            animation: swipeFor 1.6s cubic-bezier(0.42, 0, 0.58, 1) forwards; }
        @keyframes swipeFor { 0% { left: 100%;
            transform: skewX(-15deg); } 50% { left: -25%; } 100% { left: -150%; transform: skewX(-15deg);
            } }
        .swipe-backward { display: block !important;
            animation: swipeBack 1.6s cubic-bezier(0.42, 0, 0.58, 1) forwards; }
        @keyframes swipeBack { 0% { left: -150%;
            transform: skewX(15deg); } 50% { left: -25%; } 100% { left: 100%; transform: skewX(15deg);
            } }

        /* P3 3D 照片墙空间背景设为透明 */
        #page-3 { background: transparent;
            display: none; }
        #page-3.active { display: flex;
            }
        .dome-scene { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;
            transform-style: preserve-3d; cursor: grab; perspective: 1200px;}
        .dome-wrapper { position: relative; width: 0;
            height: 0; transform-style: preserve-3d; }
        
        .dome-segment {
            position: absolute;
            left: -110px; top: -140px; width: 220px; height: 280px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px;
            overflow: hidden; filter: grayscale(100%);
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); backface-visibility: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .dome-segment img {
            width: 100%;
            height: 100%; object-fit: cover; pointer-events: none;
        }
        .dome-segment:not(.focused):hover { 
            filter: grayscale(0%);
            border-color: rgba(255,255,255,0.7); 
            box-shadow: 0 0 25px rgba(255,255,255,0.2); transform: scale(1.05);
        }

        /* 调整放大照片的层级 z-index */
        .dome-segment.focused {
            filter: grayscale(0%) !important;
            border-color: rgba(255, 255, 255, 0.9) !important;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.4) !important;
            z-index: 99999 !important;
            /* 调大层级，使其浮于所有照片最上层 */
        }

        /* 第三页底部中央提示文字 */
        .p3-bottom-tip {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            pointer-events: none;
            z-index: 100;
        }

        /* 音乐图标及气泡容器 */
        .music-container {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .music-icon {
            font-size: 1.6rem;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.1);
        }
        .music-container:hover .music-icon {
            color: #06b6d4;
            transform: scale(1.15);
            text-shadow: 0 0 15px rgba(6, 182, 212, 0.8);
        }
        .music-icon.playing {
            animation: musicWave 1.4s infinite ease-in-out;
            color: #a3e635;
            text-shadow: 0 0 15px rgba(163, 230, 53, 0.8);
        }
        @keyframes musicWave {
            0%, 100% { transform: scale(1) rotate(0deg);
            }
            50% { transform: scale(1.12) rotate(10deg);
            }
        }
        .music-tooltip {
            font-family: 'Geist Pixel', monospace, sans-serif;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            opacity: 0;
            pointer-events: none;
            transform: translateX(-15px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            white-space: nowrap;
        }
        .music-container:hover .music-tooltip {
            opacity: 1;
            transform: translateX(0);
        }

        @keyframes rainbowShift { 0% { background-position: 0% 50% } 50% { background-position: 100% 50% } 100% { background-position: 0% 50% } }
        @keyframes orbit {
            0% { transform: translate(0, 0) rotate(0deg);
            }
            25% { transform: translate(150px, -60px) rotate(2deg);
            }
            50% { transform: translate(70px, 120px) rotate(-2deg);
            }
            75% { transform: translate(-120px, 50px) rotate(1deg);
            }
            100% { transform: translate(0, 0) rotate(0deg);
            }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="睡皇后-G.E.M.BGM.mp3" type="audio/mpeg">
    </audio>

    <div class="music-container" id="music-container">
        <div class="music-icon">♫</div>
        <div class="music-tooltip">Jojo's recent favourite</div>
    </div>

    <canvas id="dotFieldCanvas"></canvas>
    <div id="rainbow-transition"></div>
    <div id="shared-rainbow" class="state-p1"></div>

    <div id="p1-content" class="page-content active">
        <div class="p1-center-panel">
      
            <div class="canvas-container">
                <canvas id="textPressureCanvas"></canvas>
            </div>
            <p class="p1-subtitle split-target" data-text="try to touch the title with your mouse"></p>
            
            <button class="rainbow-btn start-btn cascade-item" id="start-button">Start!</button>
  
        </div>
    </div>

    <div id="p2-content" class="page-content">
        <div id="p2-star-layer"></div>
        <div class="board-container">
            <h2 class="split-target" data-text="Jojo's Star Board"></h2>
            
            <textarea id="message-input" class="cascade-item" placeholder="Share a thought, wish, or greeting..."></textarea>
    
            <div class="board-actions">
                <div class="action-button-block">
                    <button id="submit-private" class="board-submit-btn btn-private cascade-item">Send to your sky</button>
                    <div class="button-subheading split-target" data-text="only you and Jojo can see this message"></div>
               </div>
            
               <div class="action-button-block">
                    <button id="submit-public" class="board-submit-btn btn-public cascade-item">Send to the orbit</button>
                    <div class="button-subheading split-target" data-text="all can see this message"></div>
                </div>
            </div>
        </div>
        
        <div class="nav-bottom-left">
            <button class="rainbow-btn cascade-item" id="p2-back">Back</button>
        </div>
        <div class="nav-bottom-right">
            <button class="rainbow-btn cascade-item" id="p2-next">Next</button>
        </div>
    </div>

    <div id="page-3" class="page-content" style="z-index: 20;">
        <div class="dome-scene" id="dome-scene">
            <div class="dome-wrapper" id="dome-wrapper"></div>
        </div>
  
        <div class="nav-bottom-left">
            <button class="rainbow-btn cascade-item" id="p3-back">Back</button>
        </div>

        <div class="p3-bottom-tip cascade-item split-target" data-text="doubleclick to magnify~"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDnb6BkDv0u9FOYI3Jfw3uVeOjSwAw2pl8",
            authDomain: "jojos-rainbow-world.firebaseapp.com",
            databaseURL: "https://jojos-rainbow-world-default-rtdb.firebaseio.com",
            projectId: "jojos-rainbow-world",
            storageBucket: "jojos-rainbow-world.firebasestorage.app",
            messagingSenderId: "364505769755",
            appId: "1:364505769755:web:a253108f71963566a328be"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        function getTodayDateKey() {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        let pageVisitedStates = { p1: false, p2: false, p3: false };
        let mouse = { x: -1000, y: -1000 };
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        const bgCanvas = document.getElementById('dotFieldCanvas');
        const bgCtx = bgCanvas.getContext('2d');
        let dots = [];
        function initDotField() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
            dots = [];
            for (let x = 8; x < bgCanvas.width; x += 16) {
                for (let y = 8; y < bgCanvas.height; y += 16) {
                    dots.push({ originX: x, originY: y, x: x, y: y, sparklePhase: Math.random() * Math.PI * 2, sparkleSpeed: 0.02 + Math.random() * 0.04 });
                }
            }
        }
        window.addEventListener('resize', initDotField);
        initDotField();

        function drawCanvasFrames(time) {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            let linearGrad = bgCtx.createLinearGradient(0, 0, bgCanvas.width, bgCanvas.height);
            linearGrad.addColorStop(0, "#06B6D4"); linearGrad.addColorStop(1, "#B497CF");
            bgCtx.fillStyle = linearGrad;
            dots.forEach(dot => {
                let waveX = Math.sin(time * 0.002 + dot.originY * 0.01) * 3;
                let waveY = Math.cos(time * 0.002 + dot.originX * 0.01) * 3;
                let targetX = dot.originX + waveX; let targetY = dot.originY + waveY;
                
                let dx = targetX - mouse.x; let dy = targetY - mouse.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 350) {
                    let push = ((350 - dist) / 350) * 22;
                    let angle = Math.atan2(dy, dx);
                    targetX += Math.cos(angle) * push; targetY += Math.sin(angle) * push;
                }
               
                dot.sparklePhase += dot.sparkleSpeed;
                let currentRadius = 1.5 + Math.sin(dot.sparklePhase) * 0.6;
                bgCtx.fillRect(targetX - currentRadius/2, targetY - currentRadius/2, currentRadius, currentRadius);
            });
            requestAnimationFrame(drawCanvasFrames);
        }
        requestAnimationFrame(drawCanvasFrames);
        function triggerPageCascadeAnimation(pageId, pageContainer) {
            if (pageVisitedStates[pageId]) {
                pageContainer.classList.add('no-anim');
                return;
            }
            pageVisitedStates[pageId] = true;
            pageContainer.classList.remove('no-anim');
            const splitTargets = pageContainer.querySelectorAll('.split-target');
            splitTargets.forEach(target => {
                if(!target.hasAttribute('data-compiled')) {
                    const text = target.getAttribute('data-text');
                    target.innerHTML = '';
                    const words = text.split(' ');
        
                    words.forEach((wordStr, wIdx) => {
                        const wordSpan = document.createElement('span');
                        wordSpan.className = 'split-word';
    
                        wordStr.split('').forEach(charStr => {
                            const charSpan = document.createElement('span');
                            charSpan.className = 'split-char';
                            charSpan.textContent = charStr;
                            wordSpan.appendChild(charSpan);
                        });
                        
                        target.appendChild(wordSpan);
                        if (wIdx < words.length - 1) target.appendChild(document.createTextNode(' '));
                    });
                    target.setAttribute('data-compiled', 'true');
                }
            });

            let sequenceList = [];
            const allElements = pageContainer.querySelectorAll('.split-char, .cascade-item');
            allElements.forEach(el => {
                let currentTop = 0; let ghost = el;
                while (ghost && ghost !== pageContainer) { currentTop += ghost.offsetTop; ghost = ghost.offsetParent; }
                sequenceList.push({ element: el, top: currentTop });
            });
            sequenceList.sort((a, b) => a.top - b.top);
            sequenceList.forEach((item, index) => {
                setTimeout(() => { item.element.classList.add('animate-in'); }, index * 45);
            });
        }

        const canvas = document.getElementById('textPressureCanvas');
        const ctx = canvas.getContext('2d');
        const textStr = "jojo's rainbow world"; 
        let letters = [];
        let typingProgress = 0;
        function initTextCanvas() {
            canvas.width = 700;
            canvas.height = 150;
            ctx.font = `900 50px 'Archivo Black', sans-serif`;
            let totalWidth = 0;
            for(let i=0; i<textStr.length; i++) {
                totalWidth += ctx.measureText(textStr[i]).width + 1.5;
            }
            totalWidth -= 1.5;
            let startX = (canvas.width - totalWidth) / 2;
            letters = [];
            for(let i=0; i<textStr.length; i++) {
                let charW = ctx.measureText(textStr[i]).width;
                letters.push({ char: textStr[i], baseX: startX + charW / 2, baseY: 75, scaleX: 1, scaleY: 1, targetScaleX: 1, targetScaleY: 1, vx: 0, vy: 0 });
                startX += charW + 1.5;
            }
        }
        window.addEventListener('resize', initTextCanvas);
        function animateTextPressure() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = `900 50px 'Archivo Black', sans-serif`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            const rect = canvas.getBoundingClientRect();
            let cMouseX = mouse.x - rect.left, cMouseY = mouse.y - rect.top;
            if (typingProgress < letters.length) { typingProgress += 0.35;
            }
            letters.forEach((l, idx) => {
                if (idx > Math.floor(typingProgress)) return;
                let dx = l.baseX - cMouseX, dy = l.baseY - cMouseY;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 150) {
                    let p = (150 - dist) / 150; l.targetScaleX = 1 + p * 0.95; l.targetScaleY = 1 - p * 0.45; 
                } else { l.targetScaleX = 1; l.targetScaleY = 1; }
               
                l.vx = (l.vx + (l.targetScaleX - l.scaleX) * 0.12) * 0.78; l.scaleX += l.vx;
                l.vy = (l.vy + (l.targetScaleY - l.scaleY) * 0.12) * 0.78; l.scaleY += l.vy;
        
                ctx.save(); ctx.translate(l.baseX, l.baseY); ctx.scale(l.scaleX, l.scaleY);
                ctx.fillStyle = "#ffffff"; ctx.fillText(l.char, 0, 0); ctx.restore();
            });
            requestAnimationFrame(animateTextPressure);
        }

        // --- 防止网络超时导致黑屏的加载容灾逻辑 ---
        function runMainInit() {
            initTextCanvas();
            animateTextPressure(); 
            triggerPageCascadeAnimation('p1', document.getElementById('p1-content'));
        }

        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            runMainInit();
        } else {
            window.addEventListener('DOMContentLoaded', runMainInit);
        }

        if (document.fonts) {
            document.fonts.ready.then(() => {
                initTextCanvas();
            });
        }
        // -------------------------------------

        const domeWrapper = document.getElementById('dome-wrapper');
        const domeScene = document.getElementById('dome-scene');
        let activeFocusedSegment = null;
        for(let i=0; i<24; i++) {
            const seg = document.createElement('div');
            seg.className = 'dome-segment'; 
            seg.innerHTML = `<img src="m${i+1}.jpg" alt="Memory #${i+1}">`;
            const origTransform = `rotateY(${(360/24)*i}deg) translateZ(550px)`;
            seg.style.transform = origTransform;
            seg.dataset.origTransform = origTransform;
            seg.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                if (!activeFocusedSegment) {
                    activeFocusedSegment = seg;
                    seg.classList.add('focused');
                    // 调整放大照片的 scale 从 1.8 变为 1.4，增加上下间隙
                    seg.style.transform = `rotateY(${-rotY}deg) rotateX(${-rotX}deg) translateZ(600px) scale(1.4)`;
                } else if (activeFocusedSegment === seg) {
                    seg.classList.remove('focused');
                    seg.style.transform = seg.dataset.origTransform;
                    activeFocusedSegment = null;
                }
            });
            domeWrapper.appendChild(seg);
        }
        let isDragging = false, startX, startY, rotY = 0, rotX = 0, tRotY = 0, tRotX = 0;
        domeScene.addEventListener('mousedown', e => { 
            if (activeFocusedSegment) return;
            isDragging = true; startX = e.clientX; startY = e.clientY; 
        });
        window.addEventListener('mouseup', () => { isDragging = false; });
        window.addEventListener('mousemove', e => {
            if(!isDragging) return;
            tRotY += (e.clientX - startX) / 1.8; tRotX -= (e.clientY - startY) / 1.8;
            if(tRotX > 11) tRotX = 11; if(tRotX < -11) tRotX = -11;
            startX = e.clientX; startY = e.clientY;
        });
        function animDome() {
            rotY += (tRotY - rotY) * 0.1;
            rotX += (tRotX - rotX) * 0.1;
            domeWrapper.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) scale(0.75)`;
            if (activeFocusedSegment) {
                // 同步这里的 scale，使其在多维旋转时也保持 1.4 缩放比例以留出上下间隙
                activeFocusedSegment.style.transform = `rotateY(${-rotY}deg) rotateX(${-rotX}deg) translateZ(600px) scale(1.4)`;
            }
            requestAnimationFrame(animDome);
        }
        animDome();

        const p1Content = document.getElementById('p1-content');
        const p2Content = document.getElementById('p2-content');
        const p3Content = document.getElementById('page-3');
        const sharedRainbow = document.getElementById('shared-rainbow');
        const transitionSwipe = document.getElementById('rainbow-transition');
        const bgMusic = document.getElementById('bg-music');
        const musicContainer = document.getElementById('music-container');
        const musicIcon = musicContainer.querySelector('.music-icon');

        document.getElementById('start-button').addEventListener('click', () => {
            p1Content.classList.remove('active'); sharedRainbow.className = 'state-p2';
            setTimeout(() => { p2Content.classList.add('active'); triggerPageCascadeAnimation('p2', p2Content); }, 600);
            
            bgMusic.play().then(() => {
                musicIcon.classList.add('playing');
            }).catch(err => {
                console.log("音频自动播放被拦截:", err);
            });
        });
        musicContainer.addEventListener('dblclick', (e) => {
            e.stopPropagation();
            bgMusic.pause();
            musicIcon.classList.remove('playing');
        });
        musicContainer.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play().then(() => {
                    musicIcon.classList.add('playing');
                });
            }
        });
        document.getElementById('p2-back').addEventListener('click', () => {
            p2Content.classList.remove('active'); sharedRainbow.className = 'state-p1';
            setTimeout(() => { p1Content.classList.add('active'); triggerPageCascadeAnimation('p1', p1Content); }, 600);
        });
        document.getElementById('p2-next').addEventListener('click', () => {
            transitionSwipe.classList.add('swipe-forward');
            setTimeout(() => { 
                p2Content.classList.remove('active'); 
                p3Content.classList.add('active'); 
            }, 800);
            setTimeout(() => { transitionSwipe.classList.remove('swipe-forward'); triggerPageCascadeAnimation('p3', p3Content); }, 1600);
        });
        document.getElementById('p3-back').addEventListener('click', () => {
            if (activeFocusedSegment) {
                activeFocusedSegment.classList.remove('focused');
                activeFocusedSegment.style.transform = activeFocusedSegment.dataset.origTransform;
                activeFocusedSegment = null;
            }
            transitionSwipe.classList.add('swipe-backward');
       
            setTimeout(() => { 
                p3Content.classList.remove('active'); 
                p2Content.classList.add('active'); 
            }, 800);
            setTimeout(() => { transitionSwipe.classList.remove('swipe-backward'); triggerPageCascadeAnimation('p2', p2Content); }, 1600);
        });
        function dragElement(elmnt) {
            let p1 = 0, p2 = 0, p3 = 0, p4 = 0;
            elmnt.onmousedown = (e) => { e.preventDefault(); p3 = e.clientX; p4 = e.clientY; document.onmouseup = closeD; document.onmousemove = moveD;
            elmnt.style.animationPlayState = 'paused'; };
            function moveD(e) { p1 = p3 - e.clientX; p2 = p4 - e.clientY; p3 = e.clientX;
                p4 = e.clientY; elmnt.style.top = (elmnt.offsetTop - p2) + "px"; elmnt.style.left = (elmnt.offsetLeft - p1) + "px";
            }
            function closeD() { document.onmouseup = null;
                document.onmousemove = null; elmnt.style.animationPlayState = 'running'; }
        }

        const msgInput = document.getElementById('message-input'), p2StarLayer = document.getElementById('p2-star-layer');
        function launchStar(text, isPrivate) {
            if (!text) return;
            const star = document.createElement('div');
            star.className = isPrivate ? 'flying-star private-star' : 'flying-star';
            star.innerHTML = (isPrivate ? `🔒 ` : `✨ `) + text;
            const boxRect = msgInput.getBoundingClientRect();
            star.style.left = (boxRect.left + boxRect.width / 2) + 'px';
            star.style.top = (boxRect.top + boxRect.height / 2) + 'px';
            star.style.transform = 'translate(-50%, -50%) scale(0.1)';
            star.style.transition = 'all 1.1s cubic-bezier(0.16, 1, 0.3, 1)'; 
            p2StarLayer.appendChild(star);
            const targetLeft = 10 + Math.random() * 65; const targetTop = 10 + Math.random() * 35;
            setTimeout(() => {
                star.style.left = targetLeft + 'vw'; star.style.top = targetTop + 'vh';
                star.style.transform = 'translate(0, 0) scale(1)';
            }, 40);
            setTimeout(() => {
                star.style.transition = 'none'; 
                star.style.animation = `orbit ${14 + Math.random() * 14}s linear infinite`; 
                dragElement(star);
            }, 1150);
            msgInput.value = '';
        }

        const todayKey = getTodayDateKey();
        const publicMessagesRef = database.ref('public_messages/' + todayKey);
        const localRenderedStarIds = new Set();
        publicMessagesRef.on('child_added', (snapshot) => {
            const starId = snapshot.key;
            if (localRenderedStarIds.has(starId)) return;
            const data = snapshot.val();
            if (data && data.text) { launchStar(data.text, false); }
        });
        function handleInkSubmit(buttonId, isPrivate) {
            const btn = document.getElementById(buttonId);
            btn.addEventListener('mousedown', function(e) {
                const rect = btn.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const clickY = e.clientY - rect.top;
                btn.style.setProperty('--ripple-x', clickX + 'px');
                btn.style.setProperty('--ripple-y', clickY + 'px');
                btn.classList.add('btn-active-ink');
            });
            btn.addEventListener('click', function() {
                const text = msgInput.value.trim();
                if (!text) {
                    setTimeout(() => { btn.classList.remove('btn-active-ink'); }, 600);
                    return;
                }
    
                if (isPrivate) {
                    launchStar(text, true);
                } else {
                    const newMsgRef = publicMessagesRef.push();
                    const starId = newMsgRef.key;
                    localRenderedStarIds.add(starId);
                    newMsgRef.set({
                        text: text,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    }).then(() => {
                        launchStar(text, false);
                    }).catch((error) => {
                        console.error("Firebase write error: ", error);
                    });
                }
                setTimeout(() => { btn.classList.remove('btn-active-ink');
                }, 600);
            });
        }
        handleInkSubmit('submit-private', true);
        handleInkSubmit('submit-public', false);
    </script>
</body>
</html>
